<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <meta name="description" content="Access your dashboard after logging in securely with Firebase Authentication." />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        #logout-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
        }

        #logout-btn:hover {
            background-color: #ff1a1a;
        }
    </style>
</head>

<body>
    <main>
        <h1>Welcome to Your Dashboard</h1>
        <p>This is a protected area. Only authenticated users can access this page.</p>
        <img id="user-photo" src="" alt="Profile Picture"
            style="display: none; width: 64px; height: 64px; border-radius: 50%;">
        <p id="user-name">Loading...</p>
        <p id="user-email"></p>

        <button type="button" id="logout-btn">Logout</button>
    </main>
    <script type="module" src="app.js"></script>
</body>

</html>
